<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>馥芸AI導演Prompt生成器</title>

<style>
body{
  font-family:-apple-system, BlinkMacSystemFont;
  background:#f5f7f6;
  margin:0;
  color:#333;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#1f5b43;
}

.card{
  background:white;
  border-radius:15px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-top:10px;
}

button{
  background:#1f5b43;
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
  width:100%;
  margin-top:10px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#16392e;
}

.copy-btn{
  background:#c8a94b;
}

.danger-btn{
  background:#b94a48;
}

.secondary-btn{
  background:#888;
}

.output{
  white-space:pre-wrap;
  background:#f8f8f8;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
  font-size:14px;
}

.small{
  font-size:12px;
  color:#888;
}

/* 上傳區 */
.upload-box{
  display:block;
  background:#f3f6f5;
  border:2px dashed #1f5b43;
  border-radius:12px;
  padding:16px;
  text-align:center;
  cursor:pointer;
  color:#1f5b43;
  font-weight:bold;
  margin-top:12px;
}

.upload-box input{
  display:none;
}

#previewArea img{
  max-width:100%;
  border-radius:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎬 馥芸AI導演 Prompt生成器</h1>

<div class="card">
<h3>🎤 描述畫面 / 上傳圖片</h3>

<textarea id="inputText" placeholder="例：女生在咖啡廳用筆電工作"></textarea>

<label class="upload-box">
📷 點擊上傳圖片
<input type="file" id="imageUpload" accept="image/*">
</label>

<div id="previewArea"></div>

<button onclick="startVoice()">🎤 語音輸入</button>
<button onclick="generatePrompt()">✨ 生成 Prompt</button>

<button class="secondary-btn" onclick="clearText()">🧹 清除文字</button>
<button class="danger-btn" onclick="clearImage()">🗑 清除圖片</button>

<p class="small">支援語音 / 手動輸入 / 圖片預覽</p>
</div>

<div class="card">
<h3>✍️ 英文短影音 Prompt</h3>
<div id="output1" class="output"></div>
<button class="copy-btn" onclick="copyText('output1')">📋 複製英文</button>
</div>

<div class="card">
<h3>🧠 Gemini Imagen 進階 Prompt</h3>
<div id="output2" class="output"></div>
<button class="copy-btn" onclick="copyText('output2')">📋 複製Imagen</button>
</div>

<div class="card">
<button class="copy-btn" onclick="copyAll()">🚀 一鍵複製全部 Prompt</button>
</div>

</div>

<script>

// ===== 本機暫存 =====
window.onload = function(){
  const saved = localStorage.getItem("promptInput");
  if(saved){
    document.getElementById("inputText").value = saved;
  }
}

// ===== 圖片上傳 =====
let uploadedImageBase64 = "";

document.getElementById("imageUpload").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(event){
    uploadedImageBase64 = event.target.result;

    document.getElementById("previewArea").innerHTML =
      `<img src="${uploadedImageBase64}">`;
  };

  reader.readAsDataURL(file);
});

// ===== 語音輸入 =====
function startVoice(){
  const recognition = new webkitSpeechRecognition();
  recognition.lang = "zh-TW";
  recognition.start();

  recognition.onresult = function(event){
    document.getElementById("inputText").value = event.results[0][0].transcript;
  }
}

// ===== 生成 Prompt =====
function generatePrompt(){

  let input = document.getElementById("inputText").value;
  localStorage.setItem("promptInput", input);

  if(!input){
    alert("請輸入描述");
    return;
  }

  let imageNote = uploadedImageBase64 ? "Use provided image as reference." : "";

  let englishPrompt = `
Cinematic short video, ${input},
${imageNote}
soft cinematic scene,
slow push-in camera movement,
warm natural lighting,
premium commercial atmosphere,
black, gold and herbal green color palette,
ultra realistic details, depth of field,
4K, 24fps, no text, no watermark
`;

  let imagenPrompt = `
${input}

${imageNote}

Scene:
A cinematic environment with premium composition and clean background.

Composition:
Rule of thirds, subject slightly off center, shallow depth of field.

Camera:
Slow push-in shot, smooth cinematic movement.

Lighting:
Soft natural lighting with warm highlights.

Mood:
Warm, professional, calm and premium.

Color:
Black, gold, herbal green tones.

Style:
Cinematic, commercial, editorial.

Negative prompt:
text, watermark, distortion, bad anatomy
`;

  document.getElementById("output1").innerText = englishPrompt;
  document.getElementById("output2").innerText = imagenPrompt;
}

// ===== 複製 =====
function copyText(id){
  let text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  alert("已複製！");
}

// ===== 一鍵複製全部 =====
function copyAll(){
  let text1 = document.getElementById("output1").innerText;
  let text2 = document.getElementById("output2").innerText;

  let combined = text1 + "\n\n----------------------\n\n" + text2;

  navigator.clipboard.writeText(combined);
  alert("全部已複製！");
}

// ===== 清除文字 =====
function clearText(){
  document.getElementById("inputText").value = "";
  localStorage.removeItem("promptInput");
}

// ===== 清除圖片 =====
function clearImage(){
  uploadedImageBase64 = "";
  document.getElementById("previewArea").innerHTML = "";
  document.getElementById("imageUpload").value = "";
}

</script>

</body>
</html>
