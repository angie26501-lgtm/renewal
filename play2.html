<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>馥芸AI圖生圖指示詞生成器</title>

<style>
body{
  font-family:-apple-system;
  background:#f5f7f6;
  margin:0;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#1f5b43;
}

.card{
  background:white;
  border-radius:15px;
  padding:20px;
  margin-bottom:20px;
}

textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  background:#1f5b43;
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
  width:100%;
  margin-top:10px;
  cursor:pointer;
}

.copy-btn{
  background:#c8a94b;
}

#previewArea{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(100px,1fr));
  gap:10px;
  margin-top:10px;
}

#previewArea img{
  width:100%;
  height:100px;
  object-fit:cover;
  border-radius:10px;
}

.output{
  white-space:pre-wrap;
  background:#f8f8f8;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎬 AI照片→指示詞生成器</h1>

<div class="card">

<textarea id="inputText" placeholder="補充描述（可選）：例如 溫暖、高級感、療癒風"></textarea>

<label style="display:block;margin-top:10px;border:2px dashed #1f5b43;padding:15px;text-align:center;border-radius:10px;">
📷 上傳情境 / 主題照片（可多張）
<input type="file" id="imageUpload" accept="image/*" multiple hidden>
</label>

<div id="previewArea"></div>

<button onclick="generatePrompt()">✨ 生成圖生圖指示詞</button>
<button onclick="clearImage()">🗑 清除圖片</button>

</div>

<div class="card">
<h3>🎯 圖生圖 Prompt（可直接用）</h3>
<div id="output" class="output"></div>
<button class="copy-btn" onclick="copyText()">📋 一鍵複製</button>
</div>

</div>

<script>

let uploadedImages = [];

// ===== 上傳（可累加）=====
document.getElementById("imageUpload").addEventListener("change", function(e){

  const files = Array.from(e.target.files);

  files.forEach(file=>{
    const reader = new FileReader();

    reader.onload = function(event){
      uploadedImages.push(event.target.result);
      renderImages();
    };

    reader.readAsDataURL(file);
  });

  e.target.value = "";
});


// ===== 顯示圖片 =====
function renderImages(){
  const area = document.getElementById("previewArea");
  area.innerHTML = "";

  uploadedImages.forEach((img,index)=>{
    area.innerHTML += `
      <div style="position:relative">
        <img src="${img}">
        <button onclick="removeImage(${index})"
        style="position:absolute;top:5px;right:5px;background:red;color:white;border:none;border-radius:50%;width:20px;height:20px;">×</button>
      </div>
    `;
  });
}

function removeImage(index){
  uploadedImages.splice(index,1);
  renderImages();
}


// ===== 生成指示詞（核心升級）=====
function generatePrompt(){

  let styleText = document.getElementById("inputText").value;

  if(uploadedImages.length === 0){
    alert("請上傳至少一張圖片");
    return;
  }

  let prompt = `
Use the uploaded images as visual reference.

Reference structure:
- Image 1: main subject or concept
- Image 2+: environment, lighting, or style inspiration

Generate a high-end cinematic image based on these references.

Style direction:
${styleText || "cinematic, premium, clean composition"}

Scene:
coherent environment, professional composition

Lighting:
soft natural lighting, depth, realistic shadows

Camera:
cinematic framing, shallow depth of field

Mood:
warm, elegant, modern

Color:
black, gold, herbal green tones

Quality:
ultra realistic, high detail, 4K

Negative prompt:
text, watermark, distortion, low quality
`;

  document.getElementById("output").innerText = prompt;
}


// ===== 複製 =====
function copyText(){
  let text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
  alert("已複製！");
}

// ===== 清除 =====
function clearImage(){
  uploadedImages = [];
  document.getElementById("previewArea").innerHTML = "";
  document.getElementById("imageUpload").value = "";
}

</script>

</body>
</html>
